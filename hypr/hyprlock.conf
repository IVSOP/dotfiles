general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.05
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(33ccffee)
    inner_color = rgba(20, 20, 20, 0.9)
    font_color = rgba(200, 200, 200, 1.0)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 64
    font_family = Sans
    color = rgba(200, 200, 200, 1.0)
    position = 0, 80
    halign = center
    valign = center
}
